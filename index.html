// ===== Decoder =====
function decodeQRRaw(raw) {
  var trimmed = raw.trim();
  try {
    var binaryStr = atob(trimmed);
    var bytes = new Uint8Array(binaryStr.length);
    for (var i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
    var csv = new TextDecoder("utf-8").decode(bytes);
    if (/^\d/.test(csv) && csv.includes(",")) return { csv: csv, method: "base64" };
  } catch (e) { /* not base64 */ }
  if (trimmed.includes(",") && /[\u3000-\u9FFF]/.test(trimmed)) return { csv: trimmed, method: "direct" };
  return { csv: trimmed, method: "unknown" };
}

function parseCSV(csv) {
  var pcsv = csv;
  var jbs = [];
  var re = /\{[^}]*\}/g;
  var m;
  while ((m = re.exec(csv)) !== null) { jbs.push(m[0]); pcsv = pcsv.replace(m[0], "__J" + (jbs.length-1) + "__"); }
  var parts = pcsv.split(",");
  return parts.map(function(p) { var v = p; jbs.forEach(function(jb, i) { v = v.replace("__J"+i+"__", jb); }); return v; });
}

function extractFields(parts) {
  var nameRaw = parts[4] || "";
  var np = nameRaw.split("\u03b8");
  var nameKanji = (np[0]||"").trim(), nameKana = (np[1]||"").trim();

  var narr = parts[9] || "";
  var mainNarr = narr, memoFam = "", memoECG = "";
  var mi = narr.indexOf("@@<memo>");
  if (mi >= 0) {
    mainNarr = narr.substring(0, mi).replace(/\s*0\s*$/, "").trim();
    var ms = narr.substring(mi + 8).split("@").filter(Boolean);
    ms.forEach(function(p) {
      if (p.indexOf("\u5FC3\u96FB\u56F3") >= 0) memoECG = p.replace(/\u5FC3\u96FB\u56F3[\uFF1A:]/, "").trim();
      else memoFam = p.trim();
    });
  }

  var dob = parts[13] || "";
  var dobF = dob.length===8 ? dob.substring(0,4)+"\u5E74"+parseInt(dob.substring(4,6))+"\u6708"+parseInt(dob.substring(6,8))+"\u65E5" : "";

  function pTime(t) {
    if (!t) return {full:"",hm:""};
    var m = t.match(/(\d{4})\/(\d{2})\/(\d{2})\s+(\d{1,2}):(\d{2})/);
    if (!m) return {full:t,hm:""};
    return {full:t, hm:parseInt(m[4])+"\u6642"+m[5]+"\u5206", date:parseInt(m[2])+"\u6708"+parseInt(m[3])+"\u65E5"};
  }

  var sq = (parts[29]||"").replace(/[\uFF10-\uFF19]/g, function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);});
  var sqD = (sq.match(/^(.)/)||["",""])[1];
  var sex = parts[5]==="1"?"\u7537\u6027":parts[5]==="2"?"\u5973\u6027":"";

  return {
    nameKanji:nameKanji, nameKana:nameKana, sex:sex,
    age:parts[14]||"", dobFormatted:dobF,
    jcs:parts[15]||"", rhythm:parts[48]||memoECG||"",
    disease:parts[10]||"", reporter:parts[53]||"",
    allergy:parts[7]||"",
    mainNarrative:mainNarr, memoFamily:memoFam,
    kakuchi:pTime(parts[25]), genChaku:pTime(parts[26]),
    byoChaku:pTime(parts[28]), genPatsu:pTime(parts[35]),
    squadName:sq, squadDir:sqD,
    fieldCount:parts.length
  };
}

// ===== Components =====
function Field(props) {
  var rows = props.rows || 1;
  var s = {width:"100%",boxSizing:"border-box",padding:"8px 10px",border:"1px solid #d0d7de",borderRadius:6,fontSize:14,fontFamily:"'Noto Sans JP',sans-serif",background:"#fff",color:"#1a1a2e"};
  return React.createElement("div", {style:{marginBottom:10}},
    props.label && React.createElement("label", {style:{display:"block",fontSize:12,fontWeight:600,color:"#3a4a5a",marginBottom:3}}, props.label),
    rows > 1
      ? React.createElement("textarea", {value:props.value, onChange:function(e){props.onChange(e.target.value)}, rows:rows, placeholder:props.placeholder, style:Object.assign({},s,{resize:"vertical",lineHeight:1.6})})
      : React.createElement("input", {type:"text", value:props.value, onChange:function(e){props.onChange(e.target.value)}, placeholder:props.placeholder, style:Object.assign({},s,{height:38})})
  );
}

function InfoRow(props) {
  if (!props.value) return null;
  return React.createElement("div", {style:{display:"flex",alignItems:"baseline",gap:8,padding:"5px 0",borderBottom:"1px solid #f0f0f5"}},

    React.createElement("span", {style:{fontSize:14,color:"#1a1a2e",fontWeight:500}}, props.value)
  );
}

function App() {

  function generateKarte(d,e) {

      "\u3010\u7D4C\u904E\u3011", e.hospitalCourse||"", "",
      e.deathTime||"", "",
      "\u3010\u691C\u67FB\u6240\u898B\u3011", e.labResults||"", "",
      e.imaging||"", "",
      "\u3010Assessment/Plan\u3011", e.assessment||""
    ].join("\n");
  }

  // File handler
  function handleFile(ev) {
    var file = ev.target.files && ev.target.files[0];
    if (!file) return;
    setDecoding(true); setError(""); setDebug("\u753B\u50CF\u8AAD\u307F\u8FBC\u307F\u4E2D...");
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      if ("BarcodeDetector" in window) {
        var detector = new BarcodeDetector({formats:["qr_code"]});
        var scales = [1,1.5,2,3];
        var tryScale = function(idx) {
          if (idx >= scales.length) {
            URL.revokeObjectURL(url); setDecoding(false);
            setError("QR\u30B3\u30FC\u30C9\u3092\u691C\u51FA\u3067\u304D\u307E\u305B\u3093\u3067\u3057\u305F\u3002");
            return;
          }
          var s = scales[idx];
          var c = document.createElement("canvas");
          c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
          var ctx = c.getContext("2d");
          ctx.drawImage(img,0,0,c.width,c.height);
          detector.detect(c).then(function(res) {
            if (res.length > 0) {
              setRawText(res[0].rawValue);
              setDebug("QR\u691C\u51FA\u6210\u529F (scale="+s+"x) "+res[0].rawValue.length+"\u6587\u5B57");
              URL.revokeObjectURL(url); setDecoding(false);
            } else { tryScale(idx+1); }
          }).catch(function(){ tryScale(idx+1); });
        };
        tryScale(0);
      } else {
        URL.revokeObjectURL(url); setDecoding(false);
        setError("BarcodeDetector API\u975E\u5BFE\u5FDC\u3002Android Chrome\u3092\u3054\u5229\u7528\u304F\u3060\u3055\u3044\u3002\n\u307E\u305F\u306F\u5225\u306EQR\u30EA\u30FC\u30C0\u30FC\u30A2\u30D7\u30EA\u3067\u8AAD\u307F\u53D6\u3063\u305F\u7D50\u679C\u3092\u8CBC\u308A\u4ED8\u3051\u3066\u304F\u3060\u3055\u3044\u3002");
      }
    };
    img.onerror = function() { URL.revokeObjectURL(url); setDecoding(false); setError("\u753B\u50CF\u8AAD\u307F\u8FBC\u307F\u5931\u6557"); };
    img.src = url;
  }

  // Parse
  function handleParse() {
    if (!rawText.trim()) { setError("\u30C7\u30FC\u30BF\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044"); return; }
    setError(""); setDebug("");
    try {
      var res = decodeQRRaw(rawText);
      var parts = parseCSV(res.csv);
      var data = extractFields(parts);
      setDebug("\u30C7\u30B3\u30FC\u30C9: "+res.method+" / \u30D5\u30A3\u30FC\u30EB\u30C9\u6570: "+data.fieldCount+" / \u60A3\u8005\u540D: "+(data.nameKanji||"(\u672A\u691C\u51FA)"));

      if (!data.nameKanji && !data.disease && data.fieldCount < 10) {
        setError("\u6709\u52B9\u306AQR\u30C7\u30FC\u30BF\u3092\u8A8D\u8B58\u3067\u304D\u307E\u305B\u3093\u3067\u3057\u305F\u3002\n\u30D5\u30A3\u30FC\u30EB\u30C9\u6570: "+data.fieldCount);
        return;
      }
      setParsed(data);
      var isCPA = (data.disease||"").indexOf("CPA")>=0 || ["Asystole","VF","VT","PEA"].indexOf(data.rhythm)>=0 || parseInt(data.jcs)>=300;
      setEdits({
        chiefComplaint: isCPA?"\u9662\u5916\u5FC3\u505C\u6B62":(data.disease||""),
        genbyo: buildGenbyo(data),
        pastHistory: (data.allergy||"").indexOf("\u306A\u3057")>=0?"\u306A\u3057":(data.allergy||"\u306A\u3057"),
        medication:"\u306A\u3057", familyHistory:"\u4E0D\u660E",
        smoking:"", alcohol:"", allergyText:"",
        arrivalRhythm:"", arrivalBreathing:isCPA?"\u306A\u3057":"",
        arrivalPupil:isCPA?"\u6563\u5927\u56FA\u5B9A":"",
        trauma:"\u306A\u3057", face:isCPA?"\u84BC\u767D":"",
        ucg:"UCG\uFF1A", hospitalCourse:"", deathTime:"",
        labResults:"", imaging:"", assessment:""
      });
      setStep(1);
    } catch(err) {
      setError("\u30D1\u30FC\u30B9\u30A8\u30E9\u30FC: "+err.message);
    }
  }

  // Copy
  function handleCopy() {
    if (!outputRef.current) return;
    var text = outputRef.current.innerText;
    if (navigator.clipboard && navigator.clipboard.writeText) {

    document.body.appendChild(ta); ta.select(); document.execCommand("copy");

  }

          React.createElement("div", {style:{fontSize:11,opacity:0.7,marginTop:2}}, "\u6551\u6025\u968AQR\u30B3\u30FC\u30C9\u304B\u3089\u96FB\u5B50\u30AB\u30EB\u30C6\u8A18\u8F09\u3092\u81EA\u52D5\u751F\u6210")
        ),
        step > 0 && React.createElement("button", {onClick:function(){setStep(0);setParsed(null);setEdits({});setRawText("");setError("");setDebug("");},
          style:Object.assign({},btnO,{color:"#fff",borderColor:"rgba(255,255,255,0.4)",padding:"6px 14px",fontSize:12})}, "\u30EA\u30BB\u30C3\u30C8")
      ),
      React.createElement("div", {style:{display:"flex",gap:8,marginTop:12}},

            style:Object.assign({},btnP,{background:decoding?"#94a3b8":"#1d4ed8"})},
            decoding?"\u8AAD\u307F\u53D6\u308A\u4E2D...":"\uD83D\uDCF7 QR\u753B\u50CF\u3092\u9078\u629E / \u30AB\u30E1\u30E9\u64AE\u5F71"),
          React.createElement("div", {style:{fontSize:11,color:"#8a9aaa",marginTop:4,textAlign:"center"}}, "Android Chrome\u63A8\u5968")
        ),

        // Divider
        React.createElement("div", {style:{textAlign:"center",color:"#aaa",fontSize:12,margin:"16px 0",display:"flex",alignItems:"center",gap:12}},

        // Text paste
        React.createElement("div", {style:{marginBottom:20}},
          React.createElement("div", {style:{fontSize:11,fontWeight:700,color:"#5a6a7a",letterSpacing:1,marginBottom:6}}, "\u65B9\u6CD52: QR\u30C7\u30FC\u30BF\u3092\u30C6\u30AD\u30B9\u30C8\u8CBC\u308A\u4ED8\u3051"),
          React.createElement("textarea", {

              var t = e.clipboardData && e.clipboardData.getData("text");
              if (t) { e.preventDefault(); setRawText(t); setError(""); setDebug("\u8CBC\u308A\u4ED8\u3051\u6210\u529F: "+t.length+"\u6587\u5B57"); }
